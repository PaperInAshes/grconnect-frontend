<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work Order — GR-Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Tambahan Styling NASCAR: Flat, Blocky, Bold */
    .btn-nascar {
      border-radius: 0;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: 2px solid transparent;
    }
    .btn-nascar:hover {
      border: 2px solid #000;
    }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>

  <div class="main-content">
    <div class="page-header" style="border-bottom: 4px solid #000; padding-bottom: 10px;">
      <div class="page-header-inner">
        <div>
          <h1 class="page-title" style="text-transform: uppercase; font-weight: 800;">WORK ORDER</h1>
          <p class="page-subtitle" style="text-transform: uppercase; font-size: 0.8rem; color: #555;">Sistem Manajemen Bengkel Utama</p>
        </div>
        <div class="page-actions" id="page-actions"></div>
      </div>
    </div>

    <div class="page-body">
      <div class="table-card" style="border: 2px solid #000; border-radius: 0;">
        <div class="table-card-header" style="background: #f3f4f6; border-bottom: 2px solid #000;">
          <div class="table-card-title" style="font-weight: 800; text-transform: uppercase;">DAFTAR WORK ORDER</div>
          <div class="table-filters">
            <select class="filter-input" id="filterStatus" onchange="loadWorkOrders()" style="border-radius: 0; border: 1px solid #000; font-weight: 600;">
              <option value="">SEMUA STATUS</option>
              <option value="antrean">ANTREAN</option>
              <option value="dikerjakan">DIKERJAKAN</option>
              <option value="nunggu_part">NUNGGU PART</option>
              <option value="nunggu_pembayaran">NUNGGU PEMBAYARAN</option>
              <option value="selesai">SELESAI</option>
            </select>
            <input type="text" class="filter-input" id="filterPlat" placeholder="CARI PLAT NOMOR..." oninput="debounceLoad()" style="width:200px; border-radius: 0; border: 1px solid #000; font-weight: 600; text-transform: uppercase;" />
          </div>
        </div>
        <div class="table-wrapper" style="overflow-x: auto; width: 100%;">
          <table style="border-collapse: collapse; width: 100%; min-width: 900px;">
            <thead style="background: #111; color: #fff; text-transform: uppercase;">
              <tr>
                <th style="padding: 12px; text-align: left;">ID</th>
                <th style="padding: 12px; text-align: left;">Plat Nomor</th>
                <th style="padding: 12px; text-align: left;">Customer</th>
                <th style="padding: 12px; text-align: left;">Kendaraan</th>
                <th style="padding: 12px; text-align: left;">CA</th>
                <th style="padding: 12px; text-align: left;">Mekanik</th>
                <th style="padding: 12px; text-align: left;">Tanggal</th>
                <th style="padding: 12px; text-align: left;">Status</th>
                <th style="padding: 12px; text-align: left;">Pembayaran</th>
                <th style="padding: 12px; text-align: center; white-space: nowrap;">Aksi</th>
              </tr>
            </thead>
            <tbody id="woTable"></tbody>
          </table>
        </div>
        <div style="padding:16px 20px; border-top: 2px solid #000; background: #f3f4f6; display:flex; justify-content:space-between; align-items:center;">
          <span id="paginationInfo" style="font-size:0.8rem; font-weight: 800; text-transform: uppercase; color: #000;"></span>
          <div style="display:flex; gap:8px;" id="paginationBtns"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="modal-container"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  document.getElementById('sidebar-container').innerHTML = renderSidebar('workorders');

  let currentPage = 1;
  let debounceTimer = null;

  // ── Tombol Buat WO (hanya untuk CA & Manager) ──
  if (Auth.hasRole('ca', 'manager')) {
    document.getElementById('page-actions').innerHTML =
      `<button class="btn btn-primary btn-nascar" style="background:#dc2626; color:#fff;" onclick="showCreateWOModal()">+ BUAT WORK ORDER</button>`;
  }

  // ── Load Work Orders ──
  async function loadWorkOrders(page = 1) {
    currentPage = page;
    const tbody  = document.getElementById('woTable');
    Utils.showLoading(tbody);

    const params = { page, per_page: 10 };
    const filterSel = document.getElementById('filterStatus');
    const status    = filterSel ? filterSel.value : '';
    const plat      = document.getElementById('filterPlat').value.trim();

    // Kasir: jika tidak ada filter manual, default ke nunggu_pembayaran
    // agar antrean pembayaran langsung terlihat. Kasir tetap bisa pilih
    // 'SEMUA STATUS' (value="") dari dropdown untuk melihat seluruh WO.
    if (status) {
      // Ada pilihan eksplisit dari user → pakai langsung (termasuk jika Kasir
      // sengaja pilih "SEMUA STATUS" → value="" → blok ini tidak dimasuki)
      params.status = status;
    } else if (Auth.hasRole('kasir') && !Auth.hasRole('manager')) {
      // Kasir, belum ada filter manual → gunakan default nunggu_pembayaran
      params.status = 'nunggu_pembayaran';
      // Sync ke dropdown agar user tahu filter aktif
      if (filterSel && filterSel.value === '') {
        filterSel.value = 'nunggu_pembayaran';
      }
    }
    if (plat) params.plat_nomor = plat;

    const res = await API.getWorkOrders(params);


    if (!res || !res.ok) {
      tbody.innerHTML = `<tr><td colspan="10" style="text-align:center; color:#dc2626; padding:20px; font-weight:800;">GAGAL MEMUAT DATA SERVER</td></tr>`;
      return;
    }

    const pageData = res.data.data;
    const wos = pageData.data;
    const { total, last_page, current_page, per_page } = pageData;

    if (!wos || wos.length === 0) {
      Utils.showEmpty(tbody, 'TIDAK ADA DATA WORK ORDER');
      document.getElementById('paginationInfo').textContent = '';
      document.getElementById('paginationBtns').innerHTML  = '';
      return;
    }

    tbody.innerHTML = wos.map(wo => {
      const canUpdateProgress = Auth.hasRole('mekanik', 'ca', 'manager');
      const canPayment        = Auth.hasRole('kasir', 'manager');
      const canDeduct         = Auth.hasRole('mekanik', 'sparepart', 'manager');
      const needsAssign       = !wo.mekanik && Auth.hasRole('ca', 'manager');
      const isActive          = !['selesai', 'nunggu_pembayaran'].includes(wo.status_wo);
      const canEstimasi       = Auth.hasRole('mekanik', 'manager')
                                && (wo.status_wo === 'dikerjakan' || wo.status_wo === 'nunggu_part')
                                && wo.id_user_mekanik;
      const canAudit          = Auth.hasRole('ca', 'manager')
                                && (wo.status_wo === 'dikerjakan' || wo.status_wo === 'nunggu_part');

      const mekanikRender = wo.mekanik
        ? `<span style="font-weight:700; text-transform:uppercase;">${Utils.escapeHtml(wo.mekanik.nama_lengkap)}</span>`
        : `<span style="background:#dc2626; color:#fff; padding:4px 8px; font-size:0.75rem; font-weight:800; letter-spacing:0.05em;">BELUM ASSIGN</span>`;

      // Susun item dropdown berdasarkan role & kondisi WO
      let menuItems = '';
      menuItems += `<button class="kebab-item" onclick="showWODetail(${wo.id_wo}); closeAllKebab()">DETAIL WO</button>`;
      if (needsAssign)
        menuItems += `<button class="kebab-item item-yellow" onclick="showAssignModal(${wo.id_wo}); closeAllKebab()">ASSIGN MEKANIK</button>`;
      if (canUpdateProgress && isActive)
        menuItems += `<button class="kebab-item item-blue" onclick="showUpdateProgressModal(${wo.id_wo}); closeAllKebab()">UPDATE PROGRES</button>`;
      if (canDeduct && isActive)
        menuItems += `<button class="kebab-item" onclick="showRequestPartModal(${wo.id_wo}); closeAllKebab()">REQUEST PART</button>`;
      if (canEstimasi)
        menuItems += `<button class="kebab-item item-purple" onclick="showEstimasiModal(${wo.id_wo}, ${wo.estimasi_biaya_jasa || 0}); closeAllKebab()">ESTIMASI BIAYA</button>`;
      if (canAudit)
        menuItems += `<button class="kebab-item item-orange" onclick="showAuditModal(${wo.id_wo}, ${wo.estimasi_biaya_jasa || 0}); closeAllKebab()">AUDIT CA</button>`;
      if (canPayment && wo.status_wo === 'nunggu_pembayaran' && wo.status_pembayaran === 'belum_lunas')
        menuItems += `<button class="kebab-item item-green" onclick="showPaymentModal(${wo.id_wo}); closeAllKebab()">KONFIRMASI BAYAR</button>`;

      return `
        <tr style="border-bottom: 1px solid #d1d5db;">
          <td class="td-main" style="font-weight:800;">#${wo.id_wo}</td>
          <td><code style="background:#e5e7eb; padding:4px 8px; font-size:0.9rem; font-weight:800; border: 1px solid #000; white-space:nowrap; display:inline-block; min-width:max-content;">${wo.plat_nomor}</code></td>
          <td style="font-weight:600;">${Utils.escapeHtml(wo.kendaraan?.customer?.nama_customer || '-')}</td>
          <td style="font-size:0.85rem; font-weight:600; text-transform:uppercase;">
            ${Utils.escapeHtml(wo.kendaraan?.merk_mobil || '')} ${Utils.escapeHtml(wo.kendaraan?.model_mobil || '')}
            <br><span style="color:#555;">${wo.kendaraan?.tahun_produksi || ''}</span>
          </td>
          <td style="font-weight:600;">${Utils.escapeHtml(wo.user_c_a?.nama_lengkap || '-')}</td>
          <td>${mekanikRender}</td>
          <td style="font-size:0.85rem; font-weight:600;">${Utils.formatDate(wo.tanggal_masuk)}</td>
          <td>${Utils.statusBadge(wo.status_wo)}</td>
          <td>${Utils.statusBadge(wo.status_pembayaran)}</td>
          <td style="text-align:center;">
            <div class="kebab-wrapper">
              <button class="kebab-btn" onclick="toggleKebab(this)" title="Buka Menu Aksi">AKSI &#9660;</button>
              <div class="kebab-menu">
                ${menuItems}
              </div>
            </div>
          </td>
        </tr>
      `;
    }).join('');


    // Pagination
    const from = (current_page - 1) * per_page + 1;
    const to   = Math.min(current_page * per_page, total);
    document.getElementById('paginationInfo').textContent = `MENAMPILKAN ${from}–${to} DARI ${total} DATA`;

    let pBtns = '';
    if (current_page > 1) pBtns += `<button class="btn btn-secondary btn-sm btn-nascar" onclick="loadWorkOrders(${current_page - 1})">PREV</button>`;
    pBtns += `<span style="font-size:0.9rem; font-weight:800; color:#000; align-self:center;">HAL ${current_page}/${last_page}</span>`;
    if (current_page < last_page) pBtns += `<button class="btn btn-secondary btn-sm btn-nascar" onclick="loadWorkOrders(${current_page + 1})">NEXT</button>`;
    document.getElementById('paginationBtns').innerHTML = pBtns;
  }

  function debounceLoad() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => loadWorkOrders(1), 400);
  }

  // ── Detail WO ──
  async function showWODetail(id) {
    const res = await API.getWorkOrder(id);
    if (!res || !res.ok) { Toast.error('GAGAL MEMUAT DETAIL WO'); return; }
    const wo = res.data.data;

    const partsRows = wo.detail_parts?.map(d => `
      <tr style="border-bottom: 1px solid #d1d5db;">
        <td style="padding: 8px; font-weight:600; text-transform:uppercase;">${Utils.escapeHtml(d.sparepart?.nama_part || d.id_part)}</td>
        <td style="padding: 8px; font-weight:800;">${d.qty_pakai}</td>
        <td style="padding: 8px;">${Utils.formatCurrency(d.harga_satuan_snapshot)}</td>
        <td style="padding: 8px; font-weight:800;">${Utils.formatCurrency(d.subtotal_harga)}</td>
      </tr>
    `).join('') || '<tr><td colspan="4" style="text-align:center; padding: 10px; font-weight:600; text-transform:uppercase;">TIDAK ADA SPAREPART</td></tr>';

    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.id = 'detailModal';
    modal.innerHTML = `
      <div class="modal" style="max-width:700px; border-radius:0; border: 4px solid #000;">
        <div class="modal-header" style="background:#111; color:#fff; border-radius:0;">
          <div class="modal-title" style="text-transform:uppercase; font-weight:800; letter-spacing:0.05em;">DETAIL WO #${wo.id_wo}</div>
          <button class="modal-close" style="color:#fff;" onclick="Utils.closeModal('detailModal')">X</button>
        </div>
        <div class="modal-body" style="background:#fff;">
          <div class="detail-section" style="border: 2px solid #000; padding: 12px; margin-bottom: 16px;">
            <div class="detail-section-title" style="font-weight:800; text-transform:uppercase; border-bottom: 2px solid #000; padding-bottom: 8px; margin-bottom: 8px;">KENDARAAN & CUSTOMER</div>
            <div class="detail-grid">
              <div class="detail-item"><div class="detail-key">PLAT NOMOR</div><div class="detail-value" style="font-weight:800;">${wo.plat_nomor}</div></div>
              <div class="detail-item"><div class="detail-key">CUSTOMER</div><div class="detail-value">${Utils.escapeHtml(wo.kendaraan?.customer?.nama_customer || '-')}</div></div>
              <div class="detail-item"><div class="detail-key">KENDARAAN</div><div class="detail-value">${Utils.escapeHtml(wo.kendaraan?.merk_mobil)} ${Utils.escapeHtml(wo.kendaraan?.model_mobil)} (${wo.kendaraan?.tahun_produksi})</div></div>
              <div class="detail-item"><div class="detail-key">TELEPON</div><div class="detail-value">${wo.kendaraan?.customer?.no_telepon || '-'}</div></div>
            </div>
          </div>
          <div class="detail-section" style="border: 2px solid #000; padding: 12px; margin-bottom: 16px;">
            <div class="detail-section-title" style="font-weight:800; text-transform:uppercase; border-bottom: 2px solid #000; padding-bottom: 8px; margin-bottom: 8px;">STATUS OPERASIONAL</div>
            <div class="detail-grid">
              <div class="detail-item"><div class="detail-key">STATUS WO</div><div class="detail-value">${Utils.statusBadge(wo.status_wo)}</div></div>
              <div class="detail-item"><div class="detail-key">PEMBAYARAN</div><div class="detail-value">${Utils.statusBadge(wo.status_pembayaran)}</div></div>
              <div class="detail-item"><div class="detail-key">TANGGAL MASUK</div><div class="detail-value">${Utils.formatDate(wo.tanggal_masuk)}</div></div>
              <div class="detail-item"><div class="detail-key">CA</div><div class="detail-value" style="font-weight:800;">${Utils.escapeHtml(wo.user_c_a?.nama_lengkap || '-')}</div></div>
              <div class="detail-item"><div class="detail-key">MEKANIK</div><div class="detail-value" style="font-weight:800;">${Utils.escapeHtml(wo.mekanik?.nama_lengkap || 'BELUM ASSIGN')}</div></div>
            </div>
          </div>
          <div class="detail-section" style="border: 2px solid #000; padding: 12px; margin-bottom: 16px;">
            <div class="detail-section-title" style="font-weight:800; text-transform:uppercase; border-bottom: 2px solid #000; padding-bottom: 8px; margin-bottom: 8px;">PEMAKAIAN SPAREPART</div>
            <table style="width:100%; border-collapse: collapse;">
              <thead><tr style="background:#f3f4f6; border-bottom: 2px solid #000;">
                <th style="padding:8px; text-align:left; font-size:0.8rem; font-weight:800; text-transform:uppercase;">NAMA PART</th>
                <th style="padding:8px; text-align:left; font-size:0.8rem; font-weight:800; text-transform:uppercase;">QTY</th>
                <th style="padding:8px; text-align:left; font-size:0.8rem; font-weight:800; text-transform:uppercase;">HARGA/PCS</th>
                <th style="padding:8px; text-align:left; font-size:0.8rem; font-weight:800; text-transform:uppercase;">SUBTOTAL</th>
              </tr></thead>
              <tbody>${partsRows}</tbody>
            </table>
          </div>
          <div class="detail-section" style="border: 2px solid #000; padding: 12px; background: #f9fafb;">
            <div class="detail-section-title" style="font-weight:800; text-transform:uppercase; border-bottom: 2px solid #000; padding-bottom: 8px; margin-bottom: 8px;">RINGKASAN BIAYA</div>
            <div class="total-row" style="font-weight:600;"><span class="total-label">BIAYA JASA</span><span class="total-value">${Utils.formatCurrency(wo.total_biaya_jasa)}</span></div>
            <div class="total-row" style="font-weight:600;"><span class="total-label">BIAYA SPAREPART</span><span class="total-value">${Utils.formatCurrency(wo.total_biaya_parts)}</span></div>
            <div class="total-row grand" style="font-weight:900; font-size: 1.2rem; border-top: 2px solid #000; padding-top: 8px; margin-top: 8px;"><span class="total-label">GRAND TOTAL</span><span class="total-value">${Utils.formatCurrency(wo.grand_total)}</span></div>
          </div>
        </div>
        <div class="modal-footer" style="border-top: 2px solid #000; border-radius:0;">
          <button class="btn btn-secondary btn-nascar" onclick="Utils.closeModal('detailModal')">TUTUP</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
  }

  // ── Buat WO ──
  async function showCreateWOModal() {
    const userRes = await API.getMechanics();
    const mekaniks = (userRes?.ok ? userRes.data.data : []) || [];
    const mekanikOptions = mekaniks.map(m => `<option value="${m.id_user}">${Utils.escapeHtml(m.nama_lengkap)}</option>`).join('');

    const modal = document.createElement('div');
    modal.className = 'modal-overlay'; modal.id = 'createWOModal';
    modal.innerHTML = `
      <div class="modal" style="border-radius:0; border: 4px solid #000;">
        <div class="modal-header" style="background:#111; color:#fff; border-radius:0;">
          <div class="modal-title" style="text-transform:uppercase; font-weight:800; letter-spacing:0.05em;">BUAT WORK ORDER BARU</div>
          <button class="modal-close" style="color:#fff;" onclick="Utils.closeModal('createWOModal')">X</button>
        </div>
        <div class="modal-body" style="background:#fff;">
          <div id="createWOError" class="alert alert-error" style="display:none; border-radius:0; border: 2px solid #dc2626; font-weight:700;"></div>
          
          <div style="font-size:0.85rem; font-weight:800; text-transform:uppercase; letter-spacing:0.06em; border-bottom:2px solid #000; padding-bottom:4px; margin-bottom:12px;">DATA CUSTOMER</div>
          <div class="form-row">
            <div class="form-group"><label style="font-weight:700; text-transform:uppercase;">Nama Customer *</label><div class="input-wrapper"><input type="text" id="wo_nama_customer" style="border-radius:0; border:2px solid #000;" /></div></div>
            <div class="form-group"><label style="font-weight:700; text-transform:uppercase;">No. Telepon *</label><div class="input-wrapper"><input type="text" id="wo_no_telepon" style="border-radius:0; border:2px solid #000;" /></div></div>
          </div>
          
          <div style="font-size:0.85rem; font-weight:800; text-transform:uppercase; letter-spacing:0.06em; border-bottom:2px solid #000; padding-bottom:4px; margin:20px 0 12px;">DATA KENDARAAN</div>
          <div class="form-row">
            <div class="form-group"><label style="font-weight:700; text-transform:uppercase;">Plat Nomor *</label><div class="input-wrapper"><input type="text" id="wo_plat" style="border-radius:0; border:2px solid #000; text-transform:uppercase;" /></div></div>
            <div class="form-group"><label style="font-weight:700; text-transform:uppercase;">Tahun *</label><div class="input-wrapper"><input type="number" id="wo_tahun" style="border-radius:0; border:2px solid #000;" /></div></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label style="font-weight:700; text-transform:uppercase;">Merk *</label><div class="input-wrapper"><input type="text" id="wo_merk" style="border-radius:0; border:2px solid #000; text-transform:uppercase;" /></div></div>
            <div class="form-group"><label style="font-weight:700; text-transform:uppercase;">Model *</label><div class="input-wrapper"><input type="text" id="wo_model" style="border-radius:0; border:2px solid #000; text-transform:uppercase;" /></div></div>
          </div>
          
          <div style="font-size:0.85rem; font-weight:800; text-transform:uppercase; letter-spacing:0.06em; border-bottom:2px solid #000; padding-bottom:4px; margin:20px 0 12px;">WORK ORDER</div>
          <div class="form-group"><label style="font-weight:700; text-transform:uppercase;">Keluhan Awal *</label><textarea id="wo_keluhan" rows="3" style="width:100%; padding:10px 14px; border:2px solid #000; border-radius:0; font-family:var(--font); resize:vertical; outline:none; text-transform:uppercase;"></textarea></div>
          <div class="form-group"><label style="font-weight:700; text-transform:uppercase;">Assign Mekanik (Opsional)</label>
            <select id="wo_mekanik" style="width:100%; padding:10px 14px; border:2px solid #000; border-radius:0; outline:none; font-weight:700; text-transform:uppercase;">
              <option value="">-- PILIH MEKANIK --</option>${mekanikOptions}
            </select>
          </div>
        </div>
        <div class="modal-footer" style="border-top:2px solid #000; border-radius:0;">
          <button class="btn btn-secondary btn-nascar" onclick="Utils.closeModal('createWOModal')">BATAL</button>
          <button class="btn btn-primary btn-nascar" style="background:#dc2626; color:#fff;" id="submitCreateWO" onclick="submitCreateWO()">SIMPAN</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
  }

  async function submitCreateWO() {
    const btn = document.getElementById('submitCreateWO');
    btn.disabled = true; btn.textContent = 'PROSES...';
    const errDiv = document.getElementById('createWOError');
    errDiv.style.display = 'none'; errDiv.textContent = '';

    // Baca nilai field
    const namaCustomer  = document.getElementById('wo_nama_customer').value.trim();
    const noTelepon     = document.getElementById('wo_no_telepon').value.trim();
    const platNomor     = document.getElementById('wo_plat').value.trim().toUpperCase();
    const tahunStr      = document.getElementById('wo_tahun').value.trim();
    const merkMobil     = document.getElementById('wo_merk').value.trim().toUpperCase();
    const modelMobil    = document.getElementById('wo_model').value.trim().toUpperCase();
    const keluhanAwal   = document.getElementById('wo_keluhan').value.trim().toUpperCase();
    const mekanikIdStr  = document.getElementById('wo_mekanik').value;

    // Validasi frontend agar tidak mengirim data kosong / NaN ke backend
    const missingFields = [];
    if (!namaCustomer)  missingFields.push('NAMA CUSTOMER');
    if (!noTelepon)     missingFields.push('NO. TELEPON');
    if (!platNomor)     missingFields.push('PLAT NOMOR');
    if (!tahunStr)      missingFields.push('TAHUN PRODUKSI');
    if (!merkMobil)     missingFields.push('MERK KENDARAAN');
    if (!modelMobil)    missingFields.push('MODEL KENDARAAN');
    if (!keluhanAwal)   missingFields.push('KELUHAN AWAL');

    if (missingFields.length > 0) {
      errDiv.textContent = 'KOLOM WAJIB BELUM DIISI: ' + missingFields.join(', ') + '.';
      errDiv.style.display = 'block';
      btn.disabled = false; btn.textContent = 'SIMPAN';
      return;
    }

    const tahunProduksi = parseInt(tahunStr, 10);
    if (isNaN(tahunProduksi) || tahunProduksi < 1970 || tahunProduksi > new Date().getFullYear() + 1) {
      errDiv.textContent = 'TAHUN PRODUKSI TIDAK VALID (MIN 1970).';
      errDiv.style.display = 'block';
      btn.disabled = false; btn.textContent = 'SIMPAN';
      return;
    }

    if (noTelepon.length > 15) {
      errDiv.textContent = 'NO. TELEPON MAKSIMAL 15 KARAKTER.';
      errDiv.style.display = 'block';
      btn.disabled = false; btn.textContent = 'SIMPAN';
      return;
    }

    // Bangun payload — id_user_mekanik dikirim sebagai integer, bukan string
    const data = {
      nama_customer:  namaCustomer,
      no_telepon:     noTelepon,
      plat_nomor:     platNomor,
      tahun_produksi: tahunProduksi,
      merk_mobil:     merkMobil,
      model_mobil:    modelMobil,
      keluhan_awal:   keluhanAwal,
    };
    // Hanya sertakan jika mekanik dipilih — kirim sebagai integer, bukan string
    if (mekanikIdStr) {
      data.id_user_mekanik = parseInt(mekanikIdStr, 10);
    }

    const res = await API.createWorkOrder(data);
    btn.disabled = false; btn.textContent = 'SIMPAN';

    if (res && res.ok) {
      Toast.success('WORK ORDER BERHASIL DIBUAT!');
      Utils.closeModal('createWOModal');
      loadWorkOrders(1);
    } else {
      const errors = res?.data?.errors;
      const msg    = errors ? Object.values(errors).flat().join(' | ') : (res?.data?.message || 'GAGAL MENYIMPAN.');
      errDiv.textContent = msg; errDiv.style.display = 'block';
    }
  }

  function renderPartOptions(parts) {
    const sel = document.getElementById('reqPartSelect');
    if (!sel) return;
    if (!parts.length) {
      sel.innerHTML = '<option value="">TIDAK ADA PART TERSEDIA</option>';
      return;
    }
    sel.innerHTML = '<option value="">-- PILIH SPAREPART --</option>' +
      parts.map(p => {
        const critLabel = parseInt(p.stok_tersedia) <= parseInt(p.batas_minimum || 0)
          ? ' [KRITIS]' : '';
        return `<option value="${p.id_part}">[STOK: ${p.stok_tersedia}${critLabel}] ${Utils.escapeHtml(p.nama_part).toUpperCase()}</option>`;
      }).join('');
  }

  function filterPartOptions() {
    const keyword = document.getElementById('reqPartSearch')?.value.trim().toUpperCase() || '';
    if (!keyword) {
      renderPartOptions(allPartsCache);
      return;
    }
    const filtered = allPartsCache.filter(p =>
      p.nama_part.toUpperCase().includes(keyword)
    );
    renderPartOptions(filtered);
  }

  function setAuditDecision(decision) {
    document.getElementById('audit_keputusan').value = decision;
    const isApprove = decision === 'approved';
    document.getElementById('approveFields').style.display = isApprove ? 'block' : 'none';
    document.getElementById('rejectFields').style.display  = isApprove ? 'none'  : 'block';
    const btnA = document.getElementById('btnApprove');
    const btnR = document.getElementById('btnReject');
    btnA.style.background = isApprove ? '#16a34a' : '#fff';
    btnA.style.color      = isApprove ? '#fff'    : '#16a34a';
    btnR.style.background = isApprove ? '#fff'    : '#dc2626';
    btnR.style.color      = isApprove ? '#dc2626' : '#fff';
  }

  async function submitAudit(woId) {
    const btn = document.getElementById('submitAudit');
    btn.disabled = true; btn.textContent = 'PROSES...';
    const errDiv = document.getElementById('auditError');

    const keputusan = document.getElementById('audit_keputusan').value;
    if (!keputusan) {
      errDiv.textContent = 'PILIH KEPUTUSAN AUDIT TERLEBIH DAHULU.';
      errDiv.style.display = 'block';
      btn.disabled = false; btn.textContent = 'PROSES AUDIT';
      return;
    }

    const payload = { status_audit_ca: keputusan };

    if (keputusan === 'approved') {
      const hargaFinal = document.getElementById('audit_harga_final').value;
      if (hargaFinal) payload.total_biaya_jasa = parseFloat(hargaFinal);
    } else {
      const catatan = document.getElementById('audit_catatan').value.trim();
      if (!catatan) {
        errDiv.textContent = 'CATATAN PENOLAKAN WAJIB DIISI.';
        errDiv.style.display = 'block';
        btn.disabled = false; btn.textContent = 'PROSES AUDIT';
        return;
      }
      payload.catatan_ca = catatan.toUpperCase();
    }

    const res = await API.auditCA(woId, payload);
    btn.disabled = false; btn.textContent = 'PROSES AUDIT';

    if (res && res.ok) {
      const msg = keputusan === 'approved'
        ? 'AUDIT DISETUJUI. WO MASUK ANTRIAN PEMBAYARAN.'
        : 'AUDIT DITOLAK. WO DIKEMBALIKAN KE MEKANIK.';
      Toast.success(msg);
      Utils.closeModal('auditModal');
      loadWorkOrders(currentPage);
    } else {
      errDiv.textContent = res?.data?.message || 'GAGAL MEMPROSES AUDIT.';
      errDiv.style.display = 'block';
    }
  }

          <!-- Ringkasan Biaya Bersih -->
          <div style="border:2px solid #000; background:#f3f4f6; margin-bottom:16px;">
            <div style="background:#000; color:#fff; padding:8px 14px; font-size:0.75rem; font-weight:800; text-transform:uppercase; letter-spacing:0.08em;">RINCIAN TAGIHAN</div>
            <div style="padding:14px;">
              <div class="total-row" style="font-weight:700; text-transform:uppercase; padding:6px 0; border-bottom:1px solid #d1d5db;">
                <span class="total-label" style="color:#555;">BIAYA JASA (DITETAPKAN CA)</span>
                <span class="total-value" style="font-weight:900; color:#000;">${Utils.formatCurrency(jasaLocked)}</span>
              </div>
              <div class="total-row" style="font-weight:700; text-transform:uppercase; padding:6px 0;">
                <span class="total-label" style="color:#555;">TOTAL SPAREPART</span>
                <span class="total-value" style="font-weight:900; color:#000;">${Utils.formatCurrency(partsTotal)}</span>
              </div>
            </div>
          </div>

          <!-- Grand Total -->
          <div style="border:4px solid #000; padding:16px; background:#facc15; margin-bottom:16px;">
            <div class="total-row grand" style="font-weight:900; text-transform:uppercase;">
              <span class="total-label" style="color:#000; font-size:1rem;">GRAND TOTAL</span>
              <span class="total-value" style="color:#000; font-size:1.6rem; font-weight:900;">${Utils.formatCurrency(grandTotal)}</span>
            </div>
          </div>

          <!-- Metode Pembayaran -->
          <div class="form-group">
            <label style="font-weight:800; text-transform:uppercase; display:block; margin-bottom:8px;">METODE PEMBAYARAN *</label>
            <select id="payment_metode" style="width:100%; padding:12px 14px; border:3px solid #000; border-radius:0; font-size:1rem; font-weight:800; text-transform:uppercase; outline:none; background:#fff; cursor:pointer; appearance:none;">
              <option value="">-- PILIH METODE --</option>
              <option value="tunai">TUNAI</option>
              <option value="transfer_bank">TRANSFER BANK</option>
              <option value="qris">QRIS</option>
            </select>
          </div>

          <!-- Info Konfirmasi -->
          <div style="background:#fef3c7; border:2px solid #d97706; padding:10px 14px; font-size:0.8rem; font-weight:700; text-transform:uppercase; color:#92400e;">
            PERHATIAN: SETELAH DIKONFIRMASI, STATUS WO AKAN OTOMATIS BERUBAH MENJADI SELESAI DAN TIDAK DAPAT DIUBAH KEMBALI.
          </div>
        </div>
        <div class="modal-footer" style="border-top:2px solid #000; border-radius:0;">
          <button class="btn btn-secondary btn-nascar" onclick="Utils.closeModal('paymentModal')">BATAL</button>
          <button class="btn btn-success btn-nascar" style="background:#16a34a; color:#fff; font-size:1rem; padding:12px 24px;" id="submitPayment" onclick="submitPayment(${woId})">KONFIRMASI LUNAS</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
  }

  async function submitPayment(woId) {
    const btn    = document.getElementById('submitPayment');
    btn.disabled = true; btn.textContent = 'PROSES...';
    const errDiv = document.getElementById('paymentError');

    const metode = document.getElementById('payment_metode').value;
    if (!metode) {
      errDiv.textContent = 'PILIH METODE PEMBAYARAN TERLEBIH DAHULU.';
      errDiv.style.display = 'block';
      btn.disabled = false; btn.textContent = 'KONFIRMASI LUNAS';
      return;
    }

    const res = await API.processPayment(woId, { metode_pembayaran: metode });
    btn.disabled = false; btn.textContent = 'KONFIRMASI LUNAS';

    if (res && res.ok) {
      Toast.success('PEMBAYARAN BERHASIL. STATUS: LUNAS.');
      Utils.closeModal('paymentModal');
      loadWorkOrders(currentPage);
    } else {
      errDiv.textContent = res?.data?.message || 'GAGAL MEMPROSES PEMBAYARAN.';
      errDiv.style.display = 'block';
    }
  }

  // ── Kebab Menu: toggle buka/tutup ──
  function toggleKebab(btn) {
    const menu = btn.nextElementSibling;
    const isOpen = menu.classList.contains('open');
    closeAllKebab();
    if (!isOpen) menu.classList.add('open');
  }

  function closeAllKebab() {
    document.querySelectorAll('.kebab-menu.open').forEach(m => m.classList.remove('open'));
  }

  // Tutup semua dropdown saat klik di luar tabel
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.kebab-wrapper')) closeAllKebab();
  });

  // Initial load
  loadWorkOrders();
</script>
</body>
</html>
