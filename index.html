<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GR-Connect — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-body">

  <div class="login-container">
    <!-- Left panel: branding -->
    <div class="login-brand">
      <div class="brand-content">
        <div class="brand-logo">
          <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
            <rect width="56" height="56" fill="#cc0000"/>
            <path d="M10 46 L28 10 L46 46 Z" fill="white"/>
            <rect x="18" y="34" width="20" height="6" fill="#cc0000"/>
          </svg>
        </div>
        <h1 class="brand-name">GR-Connect</h1>
        <p class="brand-tagline">Sistem Manajemen Bengkel Terpusat</p>
        <div class="brand-features">
          <div class="feature-item">
            <div class="feature-icon">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="white"><rect width="14" height="14"/></svg>
            </div>
            <span>Work Order Real-time</span>
          </div>
          <div class="feature-item">
            <div class="feature-icon">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="white"><rect width="14" height="14"/></svg>
            </div>
            <span>Manajemen Stok Sparepart</span>
          </div>
          <div class="feature-item">
            <div class="feature-icon">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="white"><rect width="14" height="14"/></svg>
            </div>
            <span>Laporan &amp; Audit Trail</span>
          </div>
          <div class="feature-item">
            <div class="feature-icon">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="white"><rect width="14" height="14"/></svg>
            </div>
            <span>Kontrol Akses Berbasis Role</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Right panel: form -->
    <div class="login-form-panel">
      <div class="login-form-wrapper">
        <div class="login-header">
          <h2>Selamat Datang</h2>
          <p>Masuk ke akun Anda untuk melanjutkan</p>
        </div>

        <div id="login-error" class="alert alert-error" style="display:none;"></div>

        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="username">Username</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="#888"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6H2z"/></svg>
              </span>
              <input type="text" id="username" name="username" placeholder="Masukkan username" required autocomplete="username" />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="#888"><rect x="3" y="7" width="10" height="8" rx="1"/><path d="M5 7V5a3 3 0 0 1 6 0v2" fill="none" stroke="#888" stroke-width="1.5"/></svg>
              </span>
              <input type="password" id="password" name="password" placeholder="Masukkan password" required autocomplete="current-password" />
              <button type="button" class="toggle-password" onclick="togglePassword()" title="Tampilkan password">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="#888"><path d="M8 3C4 3 1 8 1 8s3 5 7 5 7-5 7-5-3-5-7-5zm0 8a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/></svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
            <span class="btn-text">MASUK</span>
            <span class="btn-loader" style="display:none;">
              <svg class="spinner" width="18" height="18" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" stroke="white" stroke-width="3" fill="none" stroke-dasharray="30 70" stroke-linecap="round"/>
              </svg>
            </span>
          </button>
        </form>


      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    function togglePassword() {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
